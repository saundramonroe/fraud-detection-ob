name: fraud-dash-outerbounds
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.11
  # Core data science
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - numba
  - imbalanced-learn
  # Visualization
  - matplotlib
  - seaborn
  - plotly
  - bokeh
  - altair
  # ML / DL
  - pytorch
  - xgboost
  - shap
  - accelerate
  # HuggingFace ecosystem
  - transformers
  - datasets
  - tokenizers
  - huggingface_hub
  - safetensors
  - sentencepiece
  # Jupyter / notebooks
  - jupyterlab
  - notebook
  - ipykernel
  - ipywidgets
  # Web / apps
  - streamlit
  - panel
  # Data / IO
  - pyarrow
  - sqlalchemy
  - boto3
  # Utilities
  - requests
  - httpx
  - pydantic
  - pydantic-settings
  - python-dotenv
  - pyyaml
  - tqdm
  - rich
  - pillow
  - gitpython
  - networkx
  # Anaconda Toolbox
  - anaconda-toolbox
  # Monitoring
  - sentry-sdk
  # Pip-only packages
  - pip
  - pip:
      - outerbounds
      - ob-metaflow
      - ob-metaflow-extensions
      - ob-metaflow-stubs
      - ob-project-utils
      - metaflow-checkpoint
      - metaflow-torchrun
      - durationpy
      - kubernetes
      - pylint
      - isort
      - tomlkit